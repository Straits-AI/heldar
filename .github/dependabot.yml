version: 2
updates:
  # Keep the GitHub Actions pinned versions current (supply-chain hygiene).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: "/apps/web"
    schedule:
      interval: weekly
