# nginx config for the Heldar dashboard container.
# Serves the built SPA and proxies API/media/health to the control plane on 127.0.0.1:8000.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/      { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location /media/    { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location = /healthz { proxy_pass http://127.0.0.1:8000; }
}
